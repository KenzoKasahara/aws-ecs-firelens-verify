# 検証3（filesystem バッファ化）専用のフル設定。
# FireLens が自動生成するベース設定は使わず、Dockerfile.fs の CMD でこのファイルを直接読み込む。
# 自動生成 forward input には storage.type を後付けできないため、forward input を自分で再定義する。
# ${AWS_REGION} / ${APP_LOG_GROUP} は log_router コンテナの environment で注入する。

[SERVICE]
    Flush                    1
    Grace                    120
    storage.path             /var/log/flb-storage/
    storage.max_chunks_up    32
    storage.backlog.flush_on_shutdown On

[INPUT]
    Name         forward
    unix_path    /var/run/fluent.sock
    threaded     true
    storage.type filesystem

[OUTPUT]
    Name                     cloudwatch_logs
    Match                    *
    region                   ${AWS_REGION}
    log_group_name           ${APP_LOG_GROUP}
    log_stream_prefix        app-
    auto_create_group        false
    workers                  2
    retry_limit              15
    storage.total_limit_size 10G

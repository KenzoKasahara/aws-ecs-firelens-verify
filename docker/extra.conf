# FireLens が自動生成するベース設定に @INCLUDE で追加される追記専用設定。
# app コンテナのログを S3 にも転送する（CloudWatch は app の logConfiguration.options が担う）。
# ${AWS_REGION} / ${S3_BUCKET_NAME} は log_router コンテナの environment で注入する。

[OUTPUT]
    Name            s3
    Match           app-firelens-*
    region          ${AWS_REGION}
    bucket          ${S3_BUCKET_NAME}
    s3_key_format   /logs/app/%Y/%m/%d/%H/%M/%S_$UUID
    total_file_size 1M
    upload_timeout  1m
    use_put_object  On
